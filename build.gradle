plugins {
    id 'java'
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.1.0'
}

group = 'frutizap'
version = '1.0.0'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21) 
    }
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'org.junit.jupiter:junit-jupiter:5.9.2'
}

javafx {
    version = '21'
    modules = ['javafx.controls']
}

application {
    mainClass = 'frutizap.ui.MainFX' 
}

test {
    useJUnitPlatform()
}

